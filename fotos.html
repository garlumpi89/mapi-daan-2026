<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fotos · Mapi & Daan</title><link rel="stylesheet" href="assets/css/styles.css"></head><body>

<main class="page"><div class="narrow"><section class="photo-box"><h1 class="title" data-i18n="photosTitle">Comparte tus fotos con nosotros</h1><div class="camera">📷</div><p class="lead" data-i18n="photosText">Nos encantará revivir este fin de semana a través de vuestros ojos.</p><p id="drivePending" class="hint" data-i18n="drivePending">El enlace de Google Drive se añadirá más adelante.</p><p><a id="driveButton" class="button" href="#" data-i18n="openDrive">Subir fotos y vídeos</a></p></section></div></main><script src="config.js"></script><script src="assets/js/i18n.js"></script><script src="assets/js/app.js"></script><script>document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('driveButton'); if(WEDDING_CONFIG.googleDriveUrl){b.href=WEDDING_CONFIG.googleDriveUrl;b.target='_blank';document.getElementById('drivePending').style.display='none'}else{b.addEventListener('click',e=>e.preventDefault())}});</script></body></html>
