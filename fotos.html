<footer class="site-footer"><span data-i18n="footer.copy">© Mapi &amp; Daan 2026</span><span class="love"><span data-i18n="footer.love">Hecho con amor</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20s-7.5-4.8-9.4-9A5.2 5.2 0 0 1 12 6.4 5.2 5.2 0 0 1 21.4 11c-1.9 4.2-9.4 9-9.4 9Z"/></svg></span></footer>
<script>
const translations = {
  es: {"photos.title":"Comparte tus fotos con nosotros","photos.text":"Nos encantará revivir este fin de semana a través de vuestros ojos. Subid aquí vuestras fotos y vídeos de la boda y de todos los momentos especiales que vivamos juntos.","photos.button":"Subir fotos y vídeos","footer.copy":"© Mapi & Daan 2026","footer.love":"Hecho con amor"},
  en: {"photos.title":"Share your photos with us","photos.text":"We would love to relive this weekend through your eyes. Upload your photos and videos from the wedding and all the special moments we share together.","photos.button":"Upload photos and videos","footer.copy":"© Mapi & Daan 2026","footer.love":"Made with love"},
  nl: {"photos.title":"Deel jullie foto's met ons","photos.text":"We zouden dit weekend graag opnieuw beleven door jullie ogen. Upload hier jullie foto's en video's van de bruiloft en van alle bijzondere momenten die we samen meemaken.","photos.button":"Foto's en video's uploaden","footer.copy":"© Mapi & Daan 2026","footer.love":"Gemaakt met liefde"}
};
function applyLang(lang){
  document.documentElement.lang = lang;
  localStorage.setItem('wedding-lang', lang);
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    if(translations[lang] && translations[lang][key]) el.textContent=translations[lang][key];
  });
  document.querySelectorAll('.lang-switch button').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
}
document.querySelectorAll('.lang-switch button').forEach(b=>b.addEventListener('click',()=>applyLang(b.dataset.lang)));
applyLang(localStorage.getItem('wedding-lang') || 'es');
</script>
<script src="js/main.js"></script>
