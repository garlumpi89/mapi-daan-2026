<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 620" fill="none">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.25"/>
    </filter>
    <style>
      .stem{stroke:#6f835f;stroke-width:3.2;stroke-linecap:round;opacity:.78}
      .stem2{stroke:#9bab82;stroke-width:2.1;stroke-linecap:round;opacity:.68}
      .leaf{fill:#78916a;opacity:.58}
      .leaf2{fill:#a7b98e;opacity:.46}
      .blue{fill:#8da7dc;opacity:.86}.blue2{fill:#6f88c8;opacity:.72}
      .pink{fill:#e7a3aa;opacity:.82}.pink2{fill:#f2c6c0;opacity:.74}
      .yellow{fill:#eec84e;opacity:.78}.cream{fill:#f7f4dd;opacity:.86}
      .purple{fill:#b8a5d8;opacity:.77}.white{fill:#eef3e9;opacity:.74}
      .center{fill:#b49a45;opacity:.9}
    </style>
  </defs>
  <g filter="url(#soft)">
    <!-- long airy stems inspired by the invitation wildflowers -->
    <path class="stem" d="M70 600 C92 500 84 405 128 320 C176 226 205 158 208 38"/>
    <path class="stem" d="M142 612 C164 505 194 425 256 350 C318 274 344 186 360 72"/>
    <path class="stem2" d="M32 532 C86 460 118 381 132 282"/>
    <path class="stem2" d="M228 585 C220 488 224 380 292 254"/>
    <path class="stem2" d="M18 430 C84 392 122 332 156 226"/>
    <path class="stem2" d="M310 602 C298 522 304 450 374 332"/>

    <!-- leaves -->
    <g>
      <ellipse class="leaf" cx="81" cy="520" rx="12" ry="31" transform="rotate(34 81 520)"/>
      <ellipse class="leaf2" cx="104" cy="455" rx="10" ry="26" transform="rotate(-38 104 455)"/>
      <ellipse class="leaf" cx="128" cy="390" rx="11" ry="31" transform="rotate(39 128 390)"/>
      <ellipse class="leaf2" cx="165" cy="302" rx="10" ry="27" transform="rotate(-34 165 302)"/>
      <ellipse class="leaf" cx="196" cy="214" rx="9" ry="26" transform="rotate(36 196 214)"/>
      <ellipse class="leaf2" cx="234" cy="498" rx="9" ry="26" transform="rotate(34 234 498)"/>
      <ellipse class="leaf" cx="263" cy="421" rx="10" ry="28" transform="rotate(-36 263 421)"/>
      <ellipse class="leaf2" cx="302" cy="337" rx="9" ry="27" transform="rotate(34 302 337)"/>
      <ellipse class="leaf" cx="337" cy="245" rx="10" ry="30" transform="rotate(-35 337 245)"/>
      <ellipse class="leaf2" cx="356" cy="160" rx="8" ry="24" transform="rotate(36 356 160)"/>
      <ellipse class="leaf" cx="55" cy="382" rx="8" ry="23" transform="rotate(-61 55 382)"/>
      <ellipse class="leaf2" cx="382" cy="386" rx="9" ry="24" transform="rotate(45 382 386)"/>
    </g>

    <!-- blue forget-me-nots -->
    <g>
      <circle class="blue" cx="166" cy="150" r="13"/><circle class="blue" cx="186" cy="155" r="12"/><circle class="blue2" cx="176" cy="133" r="12"/><circle class="blue" cx="158" cy="132" r="10"/><circle class="center" cx="174" cy="145" r="4"/>
      <circle class="blue" cx="332" cy="112" r="10"/><circle class="blue2" cx="348" cy="112" r="9"/><circle class="blue" cx="340" cy="96" r="9"/><circle class="center" cx="340" cy="108" r="3"/>
      <circle class="blue" cx="61" cy="354" r="9"/><circle class="blue2" cx="76" cy="354" r="8"/><circle class="blue" cx="68" cy="339" r="8"/><circle class="center" cx="68" cy="351" r="3"/>
    </g>

    <!-- yellow flowers -->
    <g>
      <ellipse class="yellow" cx="203" cy="40" rx="14" ry="24" transform="rotate(12 203 40)"/><ellipse class="yellow" cx="228" cy="50" rx="12" ry="21" transform="rotate(58 228 50)"/><ellipse class="yellow" cx="188" cy="62" rx="12" ry="20" transform="rotate(-38 188 62)"/><circle class="center" cx="205" cy="55" r="5"/>
      <ellipse class="yellow" cx="37" cy="516" rx="9" ry="15" transform="rotate(30 37 516)"/><ellipse class="yellow" cx="53" cy="522" rx="8" ry="15" transform="rotate(75 53 522)"/><ellipse class="yellow" cx="32" cy="533" rx="8" ry="13" transform="rotate(-28 32 533)"/><circle class="center" cx="42" cy="525" r="3"/>
      <circle class="yellow" cx="322" cy="514" r="9"/><circle class="yellow" cx="339" cy="510" r="8"/><circle class="yellow" cx="332" cy="495" r="8"/><circle class="center" cx="331" cy="507" r="3"/>
    </g>

    <!-- pink sprigs -->
    <g>
      <ellipse class="pink" cx="121" cy="262" rx="10" ry="16" transform="rotate(-20 121 262)"/><ellipse class="pink2" cx="142" cy="249" rx="9" ry="14" transform="rotate(30 142 249)"/><ellipse class="pink" cx="156" cy="228" rx="8" ry="13" transform="rotate(66 156 228)"/>
      <ellipse class="pink" cx="282" cy="286" rx="9" ry="15" transform="rotate(-28 282 286)"/><ellipse class="pink2" cx="304" cy="270" rx="8" ry="13" transform="rotate(28 304 270)"/><ellipse class="pink" cx="319" cy="247" rx="8" ry="13" transform="rotate(64 319 247)"/>
      <ellipse class="pink" cx="130" cy="560" rx="12" ry="19" transform="rotate(-16 130 560)"/><ellipse class="pink2" cx="152" cy="565" rx="10" ry="17" transform="rotate(46 152 565)"/><ellipse class="pink" cx="119" cy="582" rx="9" ry="15" transform="rotate(-52 119 582)"/><circle class="center" cx="135" cy="570" r="4"/>
    </g>

    <!-- white bells / daisies -->
    <g>
      <ellipse class="cream" cx="86" cy="298" rx="17" ry="25" transform="rotate(18 86 298)"/><ellipse class="cream" cx="112" cy="304" rx="15" ry="23" transform="rotate(62 112 304)"/><ellipse class="cream" cx="95" cy="326" rx="15" ry="21" transform="rotate(-36 95 326)"/><circle class="center" cx="98" cy="309" r="6"/>
      <path class="white" d="M373 328 q-14 -23 5 -37 q20 14 5 37z"/><path class="white" d="M338 350 q-14 -23 5 -37 q20 14 5 37z"/><path class="white" d="M352 306 q-14 -23 5 -37 q20 14 5 37z"/>
      <ellipse class="cream" cx="264" cy="590" rx="13" ry="20" transform="rotate(-23 264 590)"/><ellipse class="cream" cx="286" cy="587" rx="12" ry="19" transform="rotate(36 286 587)"/><circle class="center" cx="274" cy="588" r="4"/>
    </g>

    <!-- tiny purple lavender dots -->
    <g fill="#a995d4" opacity=".75">
      <ellipse cx="258" cy="182" rx="7" ry="10" transform="rotate(-28 258 182)"/><ellipse cx="270" cy="165" rx="6" ry="9" transform="rotate(-28 270 165)"/><ellipse cx="282" cy="148" rx="6" ry="9" transform="rotate(-28 282 148)"/><ellipse cx="295" cy="131" rx="5" ry="8" transform="rotate(-28 295 131)"/>
      <ellipse cx="72" cy="460" rx="7" ry="10" transform="rotate(25 72 460)"/><ellipse cx="61" cy="441" rx="6" ry="9" transform="rotate(25 61 441)"/><ellipse cx="52" cy="423" rx="6" ry="9" transform="rotate(25 52 423)"/>
    </g>
  </g>
</svg>