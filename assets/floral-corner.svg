<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260">
  <defs>
    <filter id="wc" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4"/>
    </filter>
    <filter id="wcSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
    <radialGradient id="petal" cx="50%" cy="78%" r="80%">
      <stop offset="0" stop-color="#fdfaf2"/>
      <stop offset=".55" stop-color="#f6efdd"/>
      <stop offset="1" stop-color="#e8dcbf"/>
    </radialGradient>
    <radialGradient id="petalShade" cx="50%" cy="82%" r="78%">
      <stop offset="0" stop-color="#f1e8d2"/>
      <stop offset="1" stop-color="#dccfae"/>
    </radialGradient>
    <radialGradient id="center" cx="42%" cy="38%" r="70%">
      <stop offset="0" stop-color="#dcc27a"/>
      <stop offset=".6" stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#a8893c"/>
    </radialGradient>
    <linearGradient id="leafA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c3bda3"/>
      <stop offset="1" stop-color="#9e9678"/>
    </linearGradient>
    <linearGradient id="leafB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d6d0b9"/>
      <stop offset="1" stop-color="#b3ab8c"/>
    </linearGradient>
    <linearGradient id="leafC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aaa285"/>
      <stop offset="1" stop-color="#8a8266"/>
    </linearGradient>
    <path id="p" d="M0 0 C -7.5 -8.5, -8.5 -24, 0 -34 C 8.5 -24, 7.5 -8.5, 0 0 Z"/>
    <path id="pS" d="M0 0 C -5.5 -6.5, -6 -17, 0 -24 C 6 -17, 5.5 -6.5, 0 0 Z"/>
    <path id="leaf" d="M0 0 C -8.5 -7.5, -10.5 -22, 0 -34 C 10.5 -22, 8.5 -7.5, 0 0 Z"/>
  </defs>

  <!-- branches hugging the two corner edges -->
  <g filter="url(#wcSoft)" fill="none" stroke-linecap="round">
    <path d="M-8 -8 C 30 28, 44 66, 36 124" stroke="#a89a7d" stroke-width="2.2" opacity=".7"/>
    <path d="M-8 -8 C 28 30, 66 44, 124 36" stroke="#a89a7d" stroke-width="2.2" opacity=".7"/>
    <path d="M22 58 C 36 76, 40 96, 38 116" stroke="#b3a88c" stroke-width="1.5" opacity=".55"/>
    <path d="M58 22 C 76 36, 96 40, 116 38" stroke="#b3a88c" stroke-width="1.5" opacity=".55"/>
  </g>

  <!-- foliage: mirrored pairs across the corner diagonal -->
  <g filter="url(#wcSoft)">
    <use href="#leaf" fill="url(#leafA)" opacity=".85" transform="translate(34 104) rotate(16) scale(.95)"/>
    <use href="#leaf" fill="url(#leafA)" opacity=".85" transform="translate(104 34) rotate(74) scale(.95)"/>
    <use href="#leaf" fill="url(#leafB)" opacity=".8" transform="translate(24 76) rotate(-6) scale(.8)"/>
    <use href="#leaf" fill="url(#leafB)" opacity=".8" transform="translate(76 24) rotate(96) scale(.8)"/>
    <use href="#leaf" fill="url(#leafC)" opacity=".75" transform="translate(44 122) rotate(34) scale(.72)"/>
    <use href="#leaf" fill="url(#leafC)" opacity=".75" transform="translate(122 44) rotate(56) scale(.72)"/>
    <use href="#leaf" fill="url(#leafB)" opacity=".7" transform="translate(16 44) rotate(-24) scale(.65)"/>
    <use href="#leaf" fill="url(#leafB)" opacity=".7" transform="translate(44 16) rotate(114) scale(.65)"/>
    <!-- gold berry dots, symmetric -->
    <g fill="#c9a84c" opacity=".5">
      <circle cx="52" cy="92" r="3"/><circle cx="92" cy="52" r="3"/>
      <circle cx="44" cy="106" r="2.2"/><circle cx="106" cy="44" r="2.2"/>
      <circle cx="60" cy="80" r="1.8"/><circle cx="80" cy="60" r="1.8"/>
    </g>
  </g>

  <!-- main bloom on the corner diagonal -->
  <g filter="url(#wc)" transform="translate(64 64)">
    <g fill="url(#petalShade)" opacity=".9">
      <use href="#p" transform="rotate(15) scale(1.06)"/><use href="#p" transform="rotate(45) scale(1.06)"/>
      <use href="#p" transform="rotate(75) scale(1.06)"/><use href="#p" transform="rotate(105) scale(1.06)"/>
      <use href="#p" transform="rotate(135) scale(1.06)"/><use href="#p" transform="rotate(165) scale(1.06)"/>
      <use href="#p" transform="rotate(195) scale(1.06)"/><use href="#p" transform="rotate(225) scale(1.06)"/>
      <use href="#p" transform="rotate(255) scale(1.06)"/><use href="#p" transform="rotate(285) scale(1.06)"/>
      <use href="#p" transform="rotate(315) scale(1.06)"/><use href="#p" transform="rotate(345) scale(1.06)"/>
    </g>
    <g fill="url(#petal)">
      <use href="#p"/><use href="#p" transform="rotate(30)"/><use href="#p" transform="rotate(60)"/>
      <use href="#p" transform="rotate(90)"/><use href="#p" transform="rotate(120)"/><use href="#p" transform="rotate(150)"/>
      <use href="#p" transform="rotate(180)"/><use href="#p" transform="rotate(210)"/><use href="#p" transform="rotate(240)"/>
      <use href="#p" transform="rotate(270)"/><use href="#p" transform="rotate(300)"/><use href="#p" transform="rotate(330)"/>
    </g>
    <circle r="10.5" fill="url(#center)"/>
    <g fill="#8a6f30" opacity=".7">
      <circle cx="0" cy="-6" r="1.2"/><circle cx="5.2" cy="-3" r="1.2"/><circle cx="5.2" cy="3" r="1.2"/>
      <circle cx="0" cy="6" r="1.2"/><circle cx="-5.2" cy="3" r="1.2"/><circle cx="-5.2" cy="-3" r="1.2"/>
      <circle r="1.4"/>
    </g>
  </g>

  <!-- two satellite blooms, mirrored pair across the diagonal -->
  <g filter="url(#wc)" transform="translate(34 138) rotate(-10) scale(.55)">
    <g fill="url(#petal)">
      <use href="#pS"/><use href="#pS" transform="rotate(45)"/><use href="#pS" transform="rotate(90)"/>
      <use href="#pS" transform="rotate(135)"/><use href="#pS" transform="rotate(180)"/>
      <use href="#pS" transform="rotate(225)"/><use href="#pS" transform="rotate(270)"/><use href="#pS" transform="rotate(315)"/>
    </g>
    <circle r="7.5" fill="url(#center)"/>
  </g>
  <g filter="url(#wc)" transform="translate(138 34) rotate(100) scale(.55)">
    <g fill="url(#petal)">
      <use href="#pS"/><use href="#pS" transform="rotate(45)"/><use href="#pS" transform="rotate(90)"/>
      <use href="#pS" transform="rotate(135)"/><use href="#pS" transform="rotate(180)"/>
      <use href="#pS" transform="rotate(225)"/><use href="#pS" transform="rotate(270)"/><use href="#pS" transform="rotate(315)"/>
    </g>
    <circle r="7.5" fill="url(#center)"/>
  </g>
</svg>
