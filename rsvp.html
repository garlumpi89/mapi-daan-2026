<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>RSVP · Mapi & Daan</title><link rel="stylesheet" href="assets/css/styles.css"></head><body>
<div class="lang"><button data-lang="es">ES</button><button data-lang="en">EN</button><button data-lang="nl">NL</button></div><img class="floating-flower flower-left" src="assets/images/Izquierda.png" alt=""><img class="floating-flower flower-right" src="assets/images/Centro.png" alt="">
<main class="form-page"><div class="narrow"><h1 class="title" data-i18n="rsvpTitle">Confirma tu asistencia</h1><form id="rsvpForm" class="form-shell">
<div class="question"><legend data-i18n="attendance">¿Podrás acompañarnos el 3 de octubre de 2026?</legend><div class="options"><label class="option"><input type="radio" name="attendance" value="yes" required> <span data-i18n="yes">Sí, asistiré</span></label><label class="option"><input type="radio" name="attendance" value="no"> <span data-i18n="no">Lamentablemente no podré asistir</span></label></div></div>
<div class="question"><label for="contactName" data-i18n="yourName">Nombre y apellidos</label><input id="contactName" name="contactName" type="text" required></div>
<div class="question optional-contact"><div class="row"><div><label for="email" data-i18n="email">Correo electrónico</label><input id="email" name="email" type="email"></div><div><label for="phone" data-i18n="phone">Teléfono</label><input id="phone" name="phone" type="tel"></div></div></div>
<div id="yesOnly" class="hidden">
<div class="question"><label for="guestCount" data-i18n="people">¿Cuántas personas vais a confirmar con esta respuesta?</label><select id="guestCount" name="guestCount"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6+</option></select></div>
<div class="question"><label for="guestNames" data-i18n="names">Nombres y apellidos de los asistentes</label><p class="hint" data-i18n="namesHint">Escribe un nombre por línea.</p><textarea id="guestNames" name="guestNames"></textarea></div>
<div class="question"><legend data-i18n="preweddingQ">¿Asistiréis también a la pre-boda?</legend><div class="options"><label class="option"><input type="radio" name="prewedding" value="yes"> <span data-i18n="yes">Sí</span></label><label class="option"><input type="radio" name="prewedding" value="no"> <span data-i18n="no">No</span></label><label class="option"><input type="radio" name="prewedding" value="unknown"> <span data-i18n="unknown">Aún no lo sabemos</span></label></div></div>
<div class="question"><legend data-i18n="busQ">¿Necesitaréis utilizar el autobús?</legend><div class="options"><label class="option"><input type="radio" name="bus" value="yes"> <span data-i18n="yes">Sí</span></label><label class="option"><input type="radio" name="bus" value="no"> <span data-i18n="no">No</span></label><label class="option"><input type="radio" name="bus" value="unknown"> <span data-i18n="unknown">Aún no lo sabemos</span></label></div></div>
<div class="question"><legend data-i18n="menus">Menús especiales y alergias</legend><div id="guestDetails"></div></div>
<div class="question"><label for="song" data-i18n="song">¿Qué canción no puede faltar en la pista de baile?</label><input id="song" name="song" type="text"></div>
<div class="question"><label for="notes" data-i18n="notes">¿Hay algo que debamos tener en cuenta para que disfrutéis plenamente del día?</label><textarea id="notes" name="notes"></textarea></div>
</div>
<div class="question"><label for="message" data-i18n="message">¿Queréis dejarnos algún mensaje?</label><textarea id="message" name="message"></textarea></div>
<div class="question"><label class="option"><input type="checkbox" name="privacy" required> <span data-i18n="privacy">Acepto que estos datos sean utilizados exclusivamente para la organización de la boda.</span></label></div>
<button class="button" type="submit" data-i18n="submit">Enviar respuesta</button><div id="status" class="status"></div>
</form></div></main><script src="config.js"></script><script src="assets/js/i18n.js"></script><script src="assets/js/app.js"></script><script src="assets/js/rsvp.js"></script></body></html>
